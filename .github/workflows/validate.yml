name: Validate trust lists

on:
  pull_request:
    paths:
      - "onboarding/**"
      - "scripts/**"
      - "trust-lists/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "onboarding/**"
      - "scripts/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Lint (ruff)
        run: uv run ruff check scripts/

      - name: Type check (mypy strict)
        run: uv run mypy

      - name: Validate onboarding entries and generate lists (unsigned)
        run: |
          uv run python scripts/generate_lists.py --no-sign --output-dir /tmp/generated \
            --issue-date "$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Verify signatures on committed lists
        run: |
          uv run python - <<'EOF'
          import glob, json, sys
          sys.path.insert(0, "scripts")
          from generate_lists import verify_json
          from lxml import etree
          from signxml import XMLVerifier

          DS = "{http://www.w3.org/2000/09/xmldsig#}"
          failed = False
          for f in glob.glob("trust-lists/NXD-TL-*.xml"):
              root = etree.parse(f).getroot()
              cert_el = root.find(f".//{DS}Signature/{DS}KeyInfo/{DS}X509Data/{DS}X509Certificate")
              if cert_el is None:
                  print(f"{f}: NOT SIGNED"); failed = True; continue
              pem = ("-----BEGIN CERTIFICATE-----\n"
                     + cert_el.text.strip() + "\n-----END CERTIFICATE-----\n")
              try:
                  XMLVerifier().verify(root, x509_cert=pem)
                  print(f"{f}: signature OK")
              except Exception as e:
                  print(f"{f}: signature INVALID: {e}"); failed = True
          for f in glob.glob("trust-lists/nxd-*-lote.json"):
              try:
                  verify_json(json.load(open(f)))
                  print(f"{f}: signature OK")
              except Exception as e:
                  print(f"{f}: signature INVALID: {e}"); failed = True
          sys.exit(1 if failed else 0)
          EOF
